            "mainEntity": [
                { "@type": "Question", "name": "¿Cuál es la mejor época para viajar a Japón?", "acceptedAnswer": { "@type": "Answer", "text": "La primavera (marzo-mayo) y el otoño (septiembre-noviembre) son las mejores épocas por el clima y los paisajes espectaculares, como los cerezos en flor o el follaje otoñal. El verano es caluroso y húmedo, y el invierno frío y seco, ideal para esquiar o disfrutar de onsens." } },
                { "@type": "Question", "name": "¿Es caro viajar a Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Puede serlo, pero con planificación se puede ajustar el presupuesto usando alojamientos económicos (cápsulas, hostels), el Japan Rail Pass y comiendo en konbini (tiendas 24h) o en restaurantes de cadena como Yoshinoya o Sukiya." } },
                { "@type": "Question", "name": "¿Necesito visado para viajar a Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Los ciudadanos de la UE, EE. UU., Canadá, Australia y muchos países latinoamericanos no necesitan visado para estancias turísticas de hasta 90 días. Verifica según tu nacionalidad antes de viajar." } },
                { "@type": "Question", "name": "¿Se habla inglés en Japón?", "acceptedAnswer": { "@type": "Answer", "text": "En las grandes ciudades y hoteles sí, pero en zonas rurales el inglés es limitado. Lleva un traductor en el móvil o aprende frases básicas en japonés como arigatou (gracias) o sumimasen (disculpe)." } },
                { "@type": "Question", "name": "¿Qué debo llevar en mi viaje a Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Lleva un adaptador de enchufe (tipo A), calzado cómodo para caminar mucho, ropa adecuada para la temporada, una tarjeta SIM o pocket Wi-Fi, efectivo en yenes y un paraguas plegable." } },
                { "@type": "Question", "name": "¿Cuántos días necesito para visitar Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Recomendamos al menos 10-14 días para recorrer Tokio, Kioto, Osaka y alguna excursión adicional como el Monte Fuji o Hiroshima. Con 7 días puedes hacer un recorrido básico." } },
                { "@type": "Question", "name": "¿Es seguro viajar a Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Japón es uno de los países más seguros del mundo, con bajos índices de criminalidad. Sin embargo, sigue las normas de seguridad habituales y respeta las costumbres locales." } },
                { "@type": "Question", "name": "¿Qué es el Japan Rail Pass y cómo funciona?", "acceptedAnswer": { "@type": "Answer", "text": "El Japan Rail Pass es un pase de tren ilimitado para turistas extranjeros que permite viajar en todos los trenes JR, incluidos los Shinkansen (excepto Nozomi y Mizuho). Se compra antes de viajar." } },
                { "@type": "Question", "name": "¿Dónde comer barato en Japón?", "acceptedAnswer": { "@type": "Answer", "text": "Las tiendas de conveniencia (konbini) como 7-Eleven, FamilyMart y Lawson ofrecen comidas económicas y de calidad. También los restaurantes de cadena como Yoshinoya, Sukiya o Matsuya." } },
                { "@type": "Question", "name": "¿Qué ver en Tokio en 3 días?", "acceptedAnswer": { "@type": "Answer", "text": "Día 1: Asakusa, Sensō-ji, Tokyo SkyTree. Día 2: Shibuya, Harajuku, Shinjuku. Día 3: Palacio Imperial, Roppongi, Odaiba." } }
